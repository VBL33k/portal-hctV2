name: Deploy Backend → VPS

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 51.83.192.92
          username: ubuntu
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd /var/www/hct
            git pull origin main
            cd backend
            npm install --production
            pm2 restart hct-backend hct-bot
            echo "✅ Deploy terminé"
